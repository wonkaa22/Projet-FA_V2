{JAVASCRIPT}

<!-- Page CGU/inscription (étape "j'accepte le règlement"). Contenu natif Forumactif
     (AGREEMENT/MY_RULES/AGREE_CONDITIONS/etc.), habillé avec nos propres classes
     préfixées pfa-cgu-* plutôt que de dépendre du .panel/.inner natif FA (voir
     reference/templates-source/agreement) — ce nom de classe est repris ailleurs
     par Forumactif lui-même, et l'utiliser dans nos composants (ancien .panel de
     la page d'accueil) cassait la mise en page de cette page-ci et masquait les
     cases à cocher. -->
<div class="content-frame pfa-cgu">
	<!-- BEGIN switch_user_logged_in -->
	<p class="pfa-cgu-meta">{LAST_VISIT_DATE}</p>
	<!-- END switch_user_logged_in -->
	<p class="pfa-cgu-meta">{CURRENT_TIME}</p>

	<!-- BEGIN switch_fb_explain -->
	<div class="pfa-cgu-notice">
		<img src="https://2img.net/i/fa/admin/icones/big_ico/warning.png" class="left" alt="" loading="lazy" />
		<div id="fb_explain">{switch_fb_explain.FB_EXPLAIN}</div>
	</div>
	<!-- END switch_fb_explain -->

	<form method="GET" id="frmAgreement" action="{U_AGREE_OVER13}">
		<div class="pfa-cgu-text">
			{AGREEMENT}<br />
			{MY_RULES}<br />
		</div>
		<div class="pfa-cgu-checks">
			<input type="hidden" name="step" value="2" />
			<!-- BEGIN switch_fb_explain -->
			<input type="hidden" name="uid" value="{switch_fb_explain.FB_UID}" />
			<!-- END switch_fb_explain -->
			<p><input type="checkbox" name="agreement" id="frmAgreeChkAgree" value="1" data-validation="required"/> <label for="frmAgreeChkAgree">{AGREE_CONDITIONS}</label></p>
			<p><input type="checkbox" name="privacy" id="frmAgreeChkPrivacy" value="1" data-validation="required"/> <label for="frmAgreeChkPrivacy">{AGREE_PRIVACY}</label></p>
		</div>
		<p class="pfa-cgu-submit">
			<input type="submit" value="{AGREE_OVER_13}" class="button1 cgu-buttons pfa-btn" />
		</p>
	</form>
</div>
